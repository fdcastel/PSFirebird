name: CI

description: Run Pester tests on Windows and Linux.

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check:
    name: Check (already tested)
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if SHA already has a passing CI run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&status=success" \
            --jq '.total_count' 2>/dev/null || echo 0)
          if [ "$count" -gt "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SHA ${{ github.sha }} already has $count successful CI run(s). Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No previous successful CI run for SHA ${{ github.sha }}. Running tests."
          fi

  unit-tests:
    name: Unit (${{ matrix.os }})
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          ## ubuntu 24.04 doesn't have a package for libncurses5
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - windows-2022
          - windows-11-arm
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run unit tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'Unit' -Output Detailed

      - name: Run cross-version tests
        ## ubuntu-24.04-arm lacks libncurses5; CrossVersion always needs Firebird 3 as source
        if: matrix.os != 'ubuntu-24.04-arm'
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'CrossVersion' -Output Detailed

  integration-tests:
    name: Integration (${{ matrix.os }}, FB ${{ matrix.firebird-version || format('snapshot-{0}', matrix.firebird-branch) }}${{ matrix.firebird-rid && format(', {0}', matrix.firebird-rid) || '' }})
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          ## ubuntu 24.04 doesn't have a package for libncurses5
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - windows-2022
        firebird-version:
          - '3.0.13'
          - '4.0.6'
          - '5.0.3'
        firebird-rid:
          - ''
        firebird-branch:
          - ''
        exclude:
          ## Ubuntu 24.04 lacks libncurses5; Firebird 3 and 4 require it
          - os: ubuntu-24.04-arm
            firebird-version: '3.0.13'
          - os: ubuntu-24.04-arm
            firebird-version: '4.0.6'
        include:
          ## Snapshot (master branch) on all four OSes
          - os: ubuntu-22.04
            firebird-branch: master
          - os: ubuntu-24.04-arm
            firebird-branch: master
          - os: windows-2022
            firebird-branch: master
          ## Windows ARM64 — native arm64 build (only available from FB6 / master)
          - os: windows-11-arm
            firebird-branch: master
            firebird-rid: win-arm64
    env:
      FIREBIRD_VERSION: ${{ matrix.firebird-version }}
      FIREBIRD_BRANCH: ${{ matrix.firebird-branch }}
      FIREBIRD_RID: ${{ matrix.firebird-rid }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run integration tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'Integration' -Output Detailed

      - name: Run cross-version tests
        ## ubuntu-24.04-arm lacks libncurses5; CrossVersion always needs Firebird 3 as source
        if: matrix.os != 'ubuntu-24.04-arm'
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'CrossVersion' -Output Detailed
