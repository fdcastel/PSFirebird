name: CI

description: Run Pester tests on Windows and Linux.

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  check:
    name: Check (already tested)
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if SHA already has a passing CI run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&status=success" \
            --jq '.total_count' 2>/dev/null || echo 0)
          if [ "$count" -gt "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SHA ${{ github.sha }} already has $count successful CI run(s). Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No previous successful CI run for SHA ${{ github.sha }}. Running tests."
          fi

  unit-tests:
    name: Unit (${{ matrix.os }})
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          ## ubuntu 24.04 doesn't have a package for libncurses5
          - ubuntu-22.04
          - windows-latest
          - windows-11-arm
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run unit tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'Unit' -Output Detailed

      - name: Run cross-version tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'CrossVersion' -Output Detailed

  integration-tests:
    name: Integration (${{ matrix.os }}, FB ${{ matrix.firebird-version || format('snapshot-{0}', matrix.firebird-branch) }}${{ matrix.firebird-rid && format(', {0}', matrix.firebird-rid) || '' }})
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
        firebird-version:
          - '3.0.12'
          - '4.0.5'
          - '5.0.3'
        firebird-rid:
          - ''
        firebird-branch:
          - ''
        include:
          ## Snapshot (v6 development) builds from the master branch
          - os: ubuntu-22.04
            firebird-branch: master
          - os: windows-latest
            firebird-branch: master
          ## Win32 (x86) — runs x86 Firebird on x64 Windows
          - os: windows-latest
            firebird-version: '3.0.12'
            firebird-rid: win-x86
          - os: windows-latest
            firebird-version: '4.0.5'
            firebird-rid: win-x86
          - os: windows-latest
            firebird-version: '5.0.3'
            firebird-rid: win-x86
          ## Windows ARM64 — uses win-x64 (x64 emulation) because Firebird has no ARM64 Windows builds yet
          - os: windows-11-arm
            firebird-version: '5.0.3'
            firebird-rid: win-x64
    env:
      FIREBIRD_VERSION: ${{ matrix.firebird-version }}
      FIREBIRD_BRANCH: ${{ matrix.firebird-branch }}
      FIREBIRD_RID: ${{ matrix.firebird-rid }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run integration tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./Tests -Tag 'Integration' -Output Detailed
